<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>建築設備士 電気設備 練習アプリ</title>
<style>
:root {
  --bg: #1a1a2e; --surface: #16213e; --card: #0f3460;
  --accent: #e94560; --accent2: #0f8c8c; --gold: #f5a623;
  --text: #eee; --text2: #aaa; --green: #4caf50; --blue: #2196F3;
}
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif; overflow-x: hidden; }

/* ── ヘッダ ── */
#header { background: linear-gradient(135deg,#1a1a2e,#0f3460); padding: 10px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
#header h1 { font-size: 15px; font-weight: 700; color: var(--gold); flex: 1; }
#year-sel { background: var(--card); color: var(--text); border: 1px solid var(--accent2); border-radius: 8px; padding: 6px 10px; font-size: 14px; }
#timer-display { font-size: 16px; font-weight: 700; color: var(--gold); min-width: 70px; text-align: center; }
#timer-btn { background: var(--accent2); color: #fff; border: none; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; }

/* ── タブ ── */
#tabs { display: flex; background: var(--surface); border-bottom: 2px solid var(--card); }
.tab { flex: 1; padding: 12px 0; text-align: center; font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text2); border-bottom: 3px solid transparent; transition: all .2s; }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(245,166,35,0.08); }

/* ── メインコンテンツ ── */
#content { padding: 12px; max-width: 900px; margin: 0 auto; }

/* ── 問題カード ── */
.problem-info { background: var(--card); border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; border-left: 4px solid var(--accent2); }
.problem-info h2 { font-size: 14px; color: var(--gold); margin-bottom: 6px; }
.problem-info .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 6px; }
.info-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 6px 10px; font-size: 12px; }
.info-label { color: var(--text2); font-size: 11px; }
.info-value { color: var(--accent2); font-weight: 600; font-size: 13px; }

/* ── ツールバー（ペン） ── */
#toolbar { display: flex; align-items: center; gap: 8px; padding: 8px; background: var(--surface); border-radius: 12px; margin-bottom: 8px; flex-wrap: wrap; }
.tool-btn { padding: 7px 13px; border-radius: 8px; border: 1px solid #444; background: var(--card); color: var(--text); font-size: 13px; cursor: pointer; transition: all .15s; }
.tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tool-btn:active { transform: scale(0.95); }
#pen-size { width: 80px; accent-color: var(--accent2); }
#pen-color { width: 36px; height: 32px; border: none; border-radius: 6px; cursor: pointer; padding: 2px; background: transparent; }
.tool-sep { width: 1px; height: 28px; background: #444; }

/* ── キャンバスエリア ── */
#canvas-wrap { position: relative; width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid var(--card); background: #fff; touch-action: none; }
#answer-canvas { display: block; width: 100%; touch-action: none; cursor: crosshair; }
#overlay-canvas { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; display: none; opacity: 0.88; }

/* ── ボタン群 ── */
#btn-row { display: flex; gap: 8px; margin: 8px 0; flex-wrap: wrap; }
.action-btn { flex: 1; min-width: 120px; padding: 10px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.action-btn:active { transform: scale(0.97); }
.btn-answer { background: linear-gradient(135deg,var(--accent2),#0a5c5c); color: #fff; }
.btn-step   { background: linear-gradient(135deg,#7b1fa2,#4a0072); color: #fff; }
.btn-clear  { background: linear-gradient(135deg,#b71c1c,#7f0000); color: #fff; }
.btn-save   { background: linear-gradient(135deg,var(--blue),#0d47a1); color: #fff; }
.btn-load   { background: linear-gradient(135deg,#2e7d32,#1b5e20); color: #fff; }

/* ── 解答オーバーレイパネル ── */
#answer-panel, #step-panel { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 200; overflow-y: auto; padding: 16px; }
.panel-inner { background: #1a2a3a; border-radius: 16px; padding: 16px; max-width: 780px; margin: 0 auto; border: 2px solid var(--accent2); }
.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.panel-title { font-size: 16px; font-weight: 700; color: var(--gold); }
.panel-close { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; }

/* ── 機器表（解答パネル内） ── */
.kiki-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 16px; }
.kiki-table th { background: #0f3460; color: var(--gold); padding: 6px 8px; text-align: center; border: 1px solid #2a4a6a; }
.kiki-table td { padding: 5px 8px; border: 1px solid #2a4a6a; vertical-align: middle; }
.kiki-table tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
.ans-val { color: #4fc3f7; font-weight: 700; font-size: 14px; }
.basis-text { color: #a5d6a7; font-size: 11px; line-height: 1.5; white-space: pre-line; }
.hint-box { background: rgba(79,195,247,0.1); border: 1px solid #4fc3f7; border-radius: 8px; padding: 10px; margin: 8px 0; }
.hint-title { color: #4fc3f7; font-weight: 600; font-size: 12px; margin-bottom: 4px; }
.hint-text { color: var(--text); font-size: 12px; white-space: pre-line; line-height: 1.6; }

/* ── ステップガイド ── */
.step-card { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent2); }
.step-num { color: var(--gold); font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.step-formula { color: #80cbc4; font-size: 12px; font-family: monospace; background: rgba(0,0,0,0.3); padding: 6px 10px; border-radius: 6px; white-space: pre-line; margin: 6px 0; }
.step-result { color: var(--accent); font-size: 14px; font-weight: 700; }

/* ── 単線結線図ヒント ── */
.tansenzu-list { list-style: none; }
.tansenzu-list li { padding: 5px 0 5px 28px; position: relative; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.tansenzu-list li::before { content: "✓"; position: absolute; left: 6px; color: var(--accent2); font-weight: 700; }
.tansenzu-list li.warn::before { content: "★"; color: var(--accent); }

/* ── 保存通知 ── */
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent2); color: #fff; padding: 10px 24px; border-radius: 20px; font-size: 14px; z-index: 300; display: none; pointer-events: none; }

/* ── スクロールバー ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
</style>
</head>

<div id="header">
  <h1>🏗 建築設備士 電気設備 練習</h1>
  <select id="year-sel" onchange="changeYear(this.value)">
    <option value="R2">R2年度</option>
    <option value="R3">R3年度</option>
    <option value="R4">R4年度</option>
    <option value="R5">R5年度</option>
    <option value="R6">R6年度</option>
    <option value="R7">R7年度</option>
  </select>
  <div id="timer-display">00:00</div>
  <button id="timer-btn" onclick="toggleTimer()">▶ 開始</button>
</div>

<div id="tabs">
  <div class="tab active" id="tab-q1" onclick="switchTab('q1')">第1問 機器表</div>
  <div class="tab" id="tab-q2" onclick="switchTab('q2')">第2問 単線結線図</div>
</div>

<div id="content">
  <!-- 問題情報 -->
  <div class="problem-info" id="problem-info"></div>

  <!-- ツールバー -->
  <div id="toolbar">
    <button class="tool-btn active" id="btn-pen"   onclick="setTool('pen')">✏️ ペン</button>
    <button class="tool-btn"        id="btn-eraser" onclick="setTool('eraser')">🧹 消しゴム</button>
    <div class="tool-sep"></div>
    <span style="font-size:12px;color:var(--text2)">太さ</span>
    <input type="range" id="pen-size" min="1" max="20" value="3">
    <input type="color"  id="pen-color" value="#1a1a2e" onchange="penColor=this.value">
    <button class="tool-btn" onclick="undo()">↩ 元に戻す</button>
  </div>

  <!-- キャンバス -->
  <div id="canvas-wrap">
    <canvas id="answer-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
  </div>

  <!-- ボタン群 -->
  <div id="btn-row">
    <button class="action-btn btn-answer" onclick="toggleAnswer()">📋 解答例 表示/非表示</button>
    <button class="action-btn btn-step"   onclick="showStep()">📐 計算手順</button>
    <button class="action-btn btn-save"   onclick="saveCanvas()">💾 保存</button>
    <button class="action-btn btn-load"   onclick="loadCanvas()">📂 読み込み</button>
    <button class="action-btn btn-clear"  onclick="clearCanvas()">🗑 クリア</button>
  </div>
</div>

<!-- 解答パネル -->
<div id="answer-panel">
  <div class="panel-inner">
    <div class="panel-header">
      <div class="panel-title" id="answer-panel-title">解答例</div>
      <button class="panel-close" onclick="closeAnswer()">✕ 閉じる</button>
    </div>
    <div id="answer-content"></div>
  </div>
</div>

<!-- ステップパネル -->
<div id="step-panel">
  <div class="panel-inner">
    <div class="panel-header">
      <div class="panel-title" id="step-panel-title">計算手順</div>
      <button class="panel-close" onclick="document.getElementById('step-panel').style.display='none'">✕ 閉じる</button>
    </div>
    <div id="step-content"></div>
  </div>
</div>

<div id="toast"></div>

// ── 状態管理 ─────────────────────────────────────────────
let currentYear = 'R2';
let currentTab  = 'q1';
let tool = 'pen';
let penColor = '#1a1a2e';
let penSize = 3;
let isDrawing = false;
let lastX = 0, lastY = 0;
let answerVisible = false;
let timerInterval = null, timerSec = 0, timerRunning = false;
let undoStack = [];

// キャンバス
const wrap    = document.getElementById('canvas-wrap');
const canvas  = document.getElementById('answer-canvas');
const overlay = document.getElementById('overlay-canvas');
const ctx     = canvas.getContext('2d');
const octx    = overlay.getContext('2d');

// ── 初期化 ───────────────────────────────────────────────
function init() {
  resizeCanvas();
  drawAnswerSheet();
  updateProblemInfo();
  window.addEventListener('resize', () => { resizeCanvas(); drawAnswerSheet(); });
}

function resizeCanvas() {
  const w = wrap.offsetWidth;
  const ratio = currentTab === 'q1' ? 1.42 : 1.33; // A4横/縦比
  const h = Math.round(w / ratio);
  canvas.width  = w; canvas.height  = h;
  overlay.width = w; overlay.height = h;
  canvas.style.height  = h + 'px';
  overlay.style.height = h + 'px';
}

// ── 答案用紙描画（問1・問2それぞれ） ─────────────────────
function drawAnswerSheet() {
  undoStack = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (currentTab === 'q1') drawQ1Sheet();
  else drawQ2Sheet();
}

function drawQ1Sheet() {
  const W = canvas.width, H = canvas.height;
  const d = YEARS[currentYear];

  // ─ フォント・スタイル設定 ─
  ctx.strokeStyle = '#000';
  ctx.fillStyle = '#000';

  // 外枠
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 10, W-20, H-20);

  // タイトル
  ctx.font = `bold ${Math.round(W*0.022)}px Yu Gothic, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('建築設備基本設計製図　電気設備（選択）', W/2, 36);

  // 第1問ラベル
  ctx.font = `bold ${Math.round(W*0.018)}px Yu Gothic, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText('第１問', 18, 60);

  // テーブル全体の座標
  const TL = 10, TR = W-10;
  const TW = TR - TL;
  const top = 68;
  const bot_q1 = H * 0.72;
  const bot_all = H - 14;

  // 列幅比率
  const c0 = TL;
  const c1 = TL + TW*0.06;   // 区分
  const c2 = TL + TW*0.13;   // 機器
  const c3 = TL + TW*0.235;  // 用途
  const c4 = TL + TW*0.29;   // 相数
  const c5 = TL + TW*0.365;  // kVA
  const c6 = TL + TW*0.42;   // 台数
  const c7 = TL + TW*0.50;   // 数値欄
  const c8 = TL + TW*0.555;  // 単位
  const c9 = TR;              // 算定根拠

  const fs  = Math.round(W*0.014); // フォントサイズ標準
  const fsS = Math.round(W*0.011); // 小
  ctx.lineWidth = 1;

  // ヘッダ行
  const hdrTop = top, hdrH = H*0.048;
  ctx.strokeRect(TL, hdrTop, TW, hdrH);
  [[c1,'区分'],[c2,'機器'],[(c2+c8)/2,'容量・台数等'],[(c8+c9)/2,'算　定　根　拠']].forEach(([x,t])=>{
    ctx.font=`bold ${fs}px Yu Gothic,sans-serif`; ctx.textAlign='center';
    ctx.fillText(t, x + (x<c8?(c2-c1)/2:0), hdrTop+hdrH*0.65);
  });
  ctx.font=`bold ${fs}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  ctx.fillText('区　分', (TL+c1)/2+c1/2-TL/2, hdrTop+hdrH*0.65);
  ctx.fillText('機　器', (c1+c2)/2, hdrTop+hdrH*0.65);
  ctx.fillText('容量・台数等', (c2+c8)/2, hdrTop+hdrH*0.65);
  ctx.fillText('算　定　根　拠', (c8+c9)/2, hdrTop+hdrH*0.65);
  [c1,c2,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,hdrTop); ctx.lineTo(x,hdrTop+hdrH); ctx.stroke(); });

  let cy = hdrTop + hdrH;

  // 行高
  const rowH = H*0.046;
  const tr_n = d.transformers.length;
  const trSubH = H*0.025;

  // ── 主遮断機行 ──
  const brk_top = cy; const brk_H = rowH;
  ctx.strokeRect(TL, brk_top, TW, brk_H);
  [c1,c2,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,brk_top); ctx.lineTo(x,brk_top+brk_H); ctx.stroke(); });
  ctx.font=`${fsS}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  ctx.fillText('主遮断器', (c1+c2)/2, brk_top+brk_H*0.62);
  // 「定格遮断電流」
  ctx.font=`${fs}px Yu Gothic,sans-serif`;
  ctx.fillText('定　格　遮　断　電　流', (c2+c7)/2, brk_top+brk_H*0.62);
  ctx.fillText('kA', (c8+c9)*0.25+c8*0.75-10, brk_top+brk_H*0.62);
  // 空欄（数値）
  ctx.fillStyle='#fffde7'; ctx.fillRect(c7+2, brk_top+2, c8-c7-4, brk_H-4);
  ctx.fillStyle='#000';
  cy += brk_H;

  // ── 変圧器 サブヘッダ ──
  const trh_top = cy; const trh_H = trSubH;
  ctx.strokeRect(TL, trh_top, TW, trh_H);
  [c1,c2,c3,c4,c5,c6,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,trh_top); ctx.lineTo(x,trh_top+trh_H); ctx.stroke(); });
  ctx.font=`${fsS}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  [[(c2+c3)/2,'用　途'],[(c3+c4)/2,'相数'],[(c4+c5)/2,'定格容量(kVA)'],[(c5+c6)/2,'台数(台)']].forEach(([x,t])=>{
    ctx.fillText(t, x, trh_top+trh_H*0.72);
  });
  cy += trh_H;

  // ── 変圧器 データ行 ──
  const tr_top = cy;
  d.transformers.forEach((_, i) => {
    const ry = cy + i*rowH;
    ctx.strokeRect(TL, ry, TW, rowH);
    [c1,c2,c3,c4,c5,c6,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,ry); ctx.lineTo(x,ry+rowH); ctx.stroke(); });
    // 空欄（kVA・台数・用途・相数）
    ['#fffde7','#fffde7','#fffde7','#fffde7'].forEach((clr, ci) => {
      const xs = [c2,c3,c4,c5][ci], xe = [c3,c4,c5,c6][ci];
      ctx.fillStyle=clr; ctx.fillRect(xs+2, ry+2, xe-xs-4, rowH-4);
    });
    ctx.fillStyle='#000';
    if(i===0){ ctx.font=`${fsS}px Yu Gothic,sans-serif`; ctx.textAlign='center'; ctx.fillText('変圧器',(c1+c2)/2, cy+tr_n*rowH/2); }
  });
  cy += tr_n * rowH;

  // ── 受変電設備の左側縦線・ラベル ──
  ctx.save();
  ctx.font=`${fsS}px Yu Gothic,sans-serif`;
  ctx.textAlign='center';
  ctx.translate((TL+c1)/2, (hdrTop+hdrH + cy)/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('受変電設備', 0, 4);
  ctx.restore();

  // ── 変流器行 ──
  const ct_top = cy;
  ctx.strokeRect(TL, ct_top, TW, rowH);
  [c1,c2,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,ct_top); ctx.lineTo(x,ct_top+rowH); ctx.stroke(); });
  ctx.font=`${fsS}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  ctx.fillText('変流器', (c1+c2)/2, ct_top+rowH*0.62);
  ctx.font=`${fs}px Yu Gothic,sans-serif`;
  ctx.fillText('定　格　一　次　電　流', (c2+c7)/2, ct_top+rowH*0.62);
  ctx.fillText('A', (c8+c9)*0.25+c8*0.75-8, ct_top+rowH*0.62);
  ctx.fillStyle='#fffde7'; ctx.fillRect(c7+2, ct_top+2, c8-c7-4, rowH-4);
  ctx.fillStyle='#000';
  cy += rowH;

  // ── 無効電力行 ──
  ctx.strokeRect(TL, cy, TW, rowH);
  [c1,c2,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,cy); ctx.lineTo(x,cy+rowH); ctx.stroke(); });
  ctx.font=`${fs}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  ctx.fillText('力率改善に必要な無効電力', (c2+c7)/2, cy+rowH*0.62);
  ctx.fillText('kvar', (c8+c9)*0.25+c8*0.75-14, cy+rowH*0.62);
  ctx.fillStyle='#fffde7'; ctx.fillRect(c7+2, cy+2, c8-c7-4, rowH-4);
  ctx.fillStyle='#000';
  cy += rowH;

  // ── コンデンサ サブヘッダ ──
  ctx.strokeRect(TL, cy, TW, trh_H);
  const c_hz = c2, c_set = c2+(c8-c2)*0.18, c_rat = c2+(c8-c2)*0.38, c_sr = c2+(c8-c2)*0.58, c_n = c2+(c8-c2)*0.77;
  [c1,c_hz,c_set,c_rat,c_sr,c_n,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,cy); ctx.lineTo(x,cy+trh_H); ctx.stroke(); });
  ctx.font=`${Math.round(fsS*0.9)}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  [[(c_hz+c_set)/2,'周波数(Hz)'],[(c_set+c_rat)/2,'定格設備容量(kvar)'],[(c_rat+c_sr)/2,'定格容量(kvar)'],
   [(c_sr+c_n)/2,'SR定格容量(kvar)'],[(c_n+c8)/2,'台数(台)']].forEach(([x,t])=>ctx.fillText(t,x,cy+trh_H*0.72));
  cy += trh_H;

  // コンデンサ数値行
  ctx.strokeRect(TL, cy, TW, rowH);
  [c1,c_hz,c_set,c_rat,c_sr,c_n,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,cy); ctx.lineTo(x,cy+rowH); ctx.stroke(); });
  [c_hz,c_set,c_rat,c_sr,c_n].forEach(x=>{ ctx.fillStyle='#fffde7'; ctx.fillRect(x+2, cy+2, (x<c_sr?(x===c_hz?c_set-x:x===c_set?c_rat-x:x===c_rat?c_sr-x:c_n-x):c8-x)-4, rowH-4); });
  ctx.fillStyle='#000';
  const cond_label = '高圧進相コンデンサ・直列リアクトル';
  ctx.save(); ctx.font=`${Math.round(fsS*0.85)}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  ctx.translate((c1+c2)/2, cy+rowH*0.5); ctx.rotate(-Math.PI/2); ctx.fillText(cond_label,0,4); ctx.restore();
  cy += rowH;

  // ── 発電機行 ──
  const gen_top = cy;
  ctx.strokeRect(TL, cy, TW, d.fuel_L ? rowH*2 : rowH*1.5);
  [c1,c2,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,cy); ctx.lineTo(x,cy+(d.fuel_L?rowH*2:rowH*1.5)); ctx.stroke(); });
  if (d.fuel_L) {
    ctx.beginPath(); ctx.moveTo(c2, cy+rowH); ctx.lineTo(c8, cy+rowH); ctx.stroke();
    ctx.font=`${fs}px Yu Gothic,sans-serif`; ctx.textAlign='center';
    ctx.fillText('発電機の定格出力', (c2+c7)/2, cy+rowH*0.55);
    ctx.fillText('kVA', (c8+c9)*0.25+c8*0.75-10, cy+rowH*0.55);
    ctx.fillStyle='#fffde7'; ctx.fillRect(c7+2, cy+2, c8-c7-4, rowH-4);
    ctx.fillStyle='#000';
    ctx.fillText('燃料消費量', (c2+c7)/2, cy+rowH*1.55);
    ctx.fillText('L', (c8+c9)*0.25+c8*0.75-8, cy+rowH*1.55);
    ctx.fillStyle='#fffde7'; ctx.fillRect(c7+2, cy+rowH+2, c8-c7-4, rowH-4);
    ctx.fillStyle='#000';
    cy += rowH*2;
  } else {
    ctx.font=`${fs}px Yu Gothic,sans-serif`; ctx.textAlign='center';
    ctx.fillText('発電機の定格出力', (c2+c7)/2, cy+rowH*0.75);
    ctx.fillText('kVA', (c8+c9)*0.25+c8*0.75-10, cy+rowH*0.75);
    ctx.fillStyle='#fffde7'; ctx.fillRect(c7+2, cy+2, c8-c7-4, rowH*1.5-4);
    ctx.fillStyle='#000';
    cy += rowH*1.5;
  }
  ctx.save(); ctx.font=`${fsS}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  ctx.translate((c1+c2)/2, (gen_top+cy)/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('発電装置', 0, 4); ctx.restore();
  ctx.save(); ctx.font=`${Math.round(fsS*0.85)}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  ctx.translate((TL+c1)/2, (gen_top+cy)/2); ctx.rotate(-Math.PI/2);
  ctx.fillText('非常用自家発電設備', 0, 4); ctx.restore();

  // ── 蓄電池・整流装置 ──
  ['鉛蓄電池','整流装置'].forEach((kiki,idx) => {
    const label = idx===0?'定　格　容　量（10時間率）':'定　格　直　流　電　流';
    const unit  = idx===0?'Ah':'A';
    ctx.strokeRect(TL, cy, TW, rowH);
    [c1,c2,c8].forEach(x=>{ ctx.beginPath(); ctx.moveTo(x,cy); ctx.lineTo(x,cy+rowH); ctx.stroke(); });
    ctx.font=`${fsS}px Yu Gothic,sans-serif`; ctx.textAlign='center';
    ctx.fillText(kiki, (c1+c2)/2, cy+rowH*0.62);
    ctx.font=`${fs}px Yu Gothic,sans-serif`;
    ctx.fillText(label, (c2+c7)/2, cy+rowH*0.62);
    ctx.fillText(unit, (c8+c9)*0.25+c8*0.75-8, cy+rowH*0.62);
    ctx.fillStyle='#fffde7'; ctx.fillRect(c7+2, cy+2, c8-c7-4, rowH-4);
    ctx.fillStyle='#000';
    cy += rowH;
  });
  ctx.save(); ctx.font=`${fsS}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  ctx.translate((TL+c1)/2, cy-rowH); ctx.rotate(-Math.PI/2);
  ctx.fillText('直流電源装置', 0, 4); ctx.restore();

  // ── 下部セクション ──
  const lower_top = cy;
  // ヘッダ
  ctx.lineWidth=2; ctx.strokeRect(TL, cy, TW, trh_H); ctx.lineWidth=1;
  const mid = TL + TW*0.38;
  ctx.beginPath(); ctx.moveTo(mid, cy); ctx.lineTo(mid, cy+trh_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(c8, cy); ctx.lineTo(c8, cy+trh_H); ctx.stroke();
  ctx.font=`bold ${fs}px Yu Gothic,sans-serif`; ctx.textAlign='center';
  ctx.fillText('算　定　結　果', (TL+mid+c8)/3, cy+trh_H*0.7);
  ctx.fillText('算　定　根　拠', (c8+c9)/2, cy+trh_H*0.7);
  // 斜線
  ctx.beginPath(); ctx.moveTo(TL, cy+trh_H); ctx.lineTo(TL+TW*0.25, cy); ctx.stroke();
  cy += trh_H;

  // (2)行
  const q2_H = rowH*1.5;
  ctx.strokeRect(TL, cy, TW, q2_H);
  ctx.beginPath(); ctx.moveTo(mid, cy); ctx.lineTo(mid, cy+q2_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(c8, cy); ctx.lineTo(c8, cy+q2_H); ctx.stroke();
  ctx.font=`${fs}px Yu Gothic,sans-serif`; ctx.textAlign='left';
  ctx.fillText(`(2)　${d.q2_label}`, TL+12, cy+q2_H*0.45);
  ctx.textAlign='right';
  ctx.fillText(d.q2_unit, c8-6, cy+q2_H*0.72);
  ctx.fillStyle='#fffde7'; ctx.fillRect(TL+4, cy+q2_H*0.5+2, mid-TL-8, q2_H*0.4);
  ctx.fillStyle='#000';
  cy += q2_H;

  // (3)行
  const q3_label_lines = d.q3_label.split('/');
  const q3_H = rowH * (q3_label_lines.length > 1 ? 2 : 1.5);
  ctx.strokeRect(TL, cy, TW, q3_H);
  ctx.beginPath(); ctx.moveTo(mid, cy); ctx.lineTo(mid, cy+q3_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(c8, cy); ctx.lineTo(c8, cy+q3_H); ctx.stroke();
  ctx.font=`${fs}px Yu Gothic,sans-serif`; ctx.textAlign='left';
  ctx.fillText('(3)　' + q3_label_lines[0], TL+12, cy+q3_H*0.35);
  if(q3_label_lines[1]) ctx.fillText('　　' + q3_label_lines[1], TL+12, cy+q3_H*0.65);
  ctx.textAlign='right';
  if(d.q3_unit) ctx.fillText(d.q3_unit, c8-6, cy+q3_H*0.75);
  ctx.fillStyle='#fffde7'; ctx.fillRect(TL+4, cy+q3_H*0.45+2, mid-TL-8, q3_H*0.4);
  ctx.fillStyle='#000';
}

function drawQ2Sheet() {
  const W = canvas.width, H = canvas.height;
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
  ctx.strokeRect(10, 10, W-20, H-20);
  ctx.lineWidth = 1;

  // ヘッダ
  ctx.font = `bold ${Math.round(W*0.02)}px Yu Gothic,sans-serif`;
  ctx.textAlign = 'left'; ctx.fillStyle = '#000';
  ctx.fillText('第２問', 18, 36);
  ctx.font = `bold ${Math.round(W*0.018)}px Yu Gothic,sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText('単線結線図', W*0.12, 36);

  // 方眼
  const gridTop = 48, gridLeft = 12, gridRight = W-12, gridBot = H-14;
  const step = Math.round(W/60);
  ctx.strokeStyle = '#c8d8e8'; ctx.lineWidth = 0.4;
  for (let x=gridLeft; x<=gridRight; x+=step) { ctx.beginPath(); ctx.moveTo(x,gridTop); ctx.lineTo(x,gridBot); ctx.stroke(); }
  for (let y=gridTop; y<=gridBot; y+=step) { ctx.beginPath(); ctx.moveTo(gridLeft,y); ctx.lineTo(gridRight,y); ctx.stroke(); }

  // 外枠
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
  ctx.strokeRect(gridLeft, gridTop, gridRight-gridLeft, gridBot-gridTop);
}

// ── 描画イベント ─────────────────────────────────────────
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const scaleX = canvas.width / r.width;
  const scaleY = canvas.height / r.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - r.left) * scaleX, y: (src.clientY - r.top) * scaleY };
}

function startDraw(e) {
  e.preventDefault();
  const {x,y} = getPos(e);
  isDrawing = true; lastX = x; lastY = y;
  ctx.beginPath(); ctx.moveTo(x, y);
  pushUndo();
}
function draw(e) {
  if (!isDrawing) return; e.preventDefault();
  const {x,y} = getPos(e);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  if (tool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = parseInt(document.getElementById('pen-size').value) * 4;
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.lineWidth = parseInt(document.getElementById('pen-size').value);
    ctx.strokeStyle = penColor;
  }
  ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
  lastX = x; lastY = y;
}
function endDraw(e) { isDrawing = false; ctx.globalCompositeOperation = 'source-over'; }

canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  draw);
canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, {passive:false});
canvas.addEventListener('touchmove',  draw,      {passive:false});
canvas.addEventListener('touchend',   endDraw);

// ── ツール設定 ───────────────────────────────────────────
function setTool(t) {
  tool = t;
  document.getElementById('btn-pen').classList.toggle('active', t==='pen');
  document.getElementById('btn-eraser').classList.toggle('active', t==='eraser');
  document.getElementById('pen-color').disabled = (t==='eraser');
}

// ── undo ─────────────────────────────────────────────────
function pushUndo() {
  if (undoStack.length > 30) undoStack.shift();
  undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}
function undo() {
  if (undoStack.length === 0) return;
  ctx.putImageData(undoStack.pop(), 0, 0);
}

  let html = `

  d.transformers.forEach(([y,s,k,n,b])=>{
    html+=`<tr><td style="padding:4px 6px;border:1px solid #2a4a6a">${y}</td><td style="padding:4px 6px;border:1px solid #2a4a6a">${s}</td><td style="padding:4px 6px;border:1px solid #2a4a6a;color:#4fc3f7;font-weight:700">${k}</td><td style="padding:4px 6px;border:1px solid #2a4a6a;color:#4fc3f7;font-weight:700">${n}</td><td style="padding:4px 6px;border:1px solid #2a4a6a" class="basis-text">${b}</td></tr>`;

    [`発電装置`,`発電機定格出力`,`${d.gen_kVA} kVA (${d.gen_v})`,
     `防災保安負荷=(${d.ud1}+${d.ud3})VA/m²×延べ面積\n×概略係数1.4 → ${d.gen_kVA}kVA`],

  basisLines.push(

// ── 保存・読み込み ────────────────────────────────────────
async function saveCanvas() {
  const key = `canvas_${currentYear}_${currentTab}`;
  try {
    const dataURL = canvas.toDataURL('image/png');
    await window.storage.set(key, dataURL);
    showToast('💾 保存しました');
  } catch(e) { showToast('保存失敗: '+e.message); }
}

async function loadCanvas() {
  const key = `canvas_${currentYear}_${currentTab}`;
  try {
    const result = await window.storage.get(key);
    if (!result) { showToast('保存データがありません'); return; }
    const img = new Image();
    img.onload = ()=>{ ctx.drawImage(img, 0, 0, canvas.width, canvas.height); };
    img.src = result.value;
    showToast('📂 読み込みました');
  } catch(e) { showToast('データなし'); }
}

function toggleTimer() {
  const btn = document.getElementById('timer-btn');
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    btn.textContent = '▶ 再開';
  } else {
    timerInterval = setInterval(()=>{
      timerSec++;
      const m = String(Math.floor(timerSec/60)).padStart(2,'0');
      const s = String(timerSec%60).padStart(2,'0');
      document.getElementById('timer-display').textContent = `${m}:${s}`;
    }, 1000);
    timerRunning = true;
    btn.textContent = '⏸ 停止';
  }
}

// ── トースト ─────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, 2000);
}

// ── ペンカラー初期値を黒に ──
document.getElementById('pen-color').value = '#000000';
penColor = '#000000';

// 起動
window.addEventListener('load', init);
</script>
